<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSTRA AI</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-body">

  <div class="login-card">
    <h1>INSTRA AI</h1>
    <p class="subtitle">Instrument, Control & Measurement Troubleshooting Assistant</p>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="flow@demo.com" required />

      <label>Password</label>
      <input type="password" id="password" placeholder="demo123" required />

      <button type="submit">Login</button>
    </form>

    <div class="demo-box">
      <strong>Demo Login</strong>
      <p>Free user: free@demo.com / demo123</p>
      <p>Flow package: flow@demo.com / demo123</p>
      <p>Admin: admin@demo.com / admin123</p>
    </div>

    <p id="loginMessage" class="message"></p>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
